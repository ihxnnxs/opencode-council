name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the current package version to npm
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build release package
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Run syntax checks
        run: npm run check

      - name: Build npm tarball
        run: npm pack

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"

      - name: Attach tarball to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: "*.tgz"
          generate_release_notes: true

      - name: Publish to npm
        if: github.event_name == 'workflow_dispatch' && inputs.publish_npm && env.NODE_AUTH_TOKEN != ''
        run: npm publish --access public --provenance

      - name: Skip npm publish
        if: github.event_name != 'workflow_dispatch' || !inputs.publish_npm || env.NODE_AUTH_TOKEN == ''
        run: |
          echo "Built the package artifact. npm publish is only run from workflow_dispatch with publish_npm=true and NPM_TOKEN configured."
